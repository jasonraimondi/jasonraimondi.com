name: deploy to s3

on:
  push:
    branches:
      - main
      - workflow
#  schedule:
#    - cron: "0 15 * * *"

jobs:
  resume:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/build
      - name: Install Google Fonts
        run: |
          wget -O Fira_Sans.zip https://fonts.google.com/download?family=Fira%20Sans
          unzip -d fira_sans/ Fira_Sans.zip
          mv fira_sans /usr/share/fonts/
          fc-cache -fv
      - run: pnpm install --frozen-lockfile --production false
      - run: pnpx playwright install --with-deps
      - run: pnpm gen:resume:ci
      - uses: actions/upload-artifact@v3
        with:
          name: my-resume
          path: resume.pdf
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  publish:
    runs-on: ubuntu-latest
    needs: resume
    steps:
      - uses: ./.github/actions/build
      - run: pnpm install --frozen-lockfile --production false
      - uses: actions/download-artifact@v3
        with:
          name: my-resume
          path: static/resume
      - run: $HOME/hugo --gc --cleanDestinationDir
      - name: Deploy to S3
        if: github.ref == 'refs/heads/main'
        run: $HOME/hugo -v deploy --maxDeletes -1 --invalidateCDN true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
